# 自動デプロイ: main ブランチへの push で https://sport-performance-library.web.app にデプロイ
#
# 事前設定: GitHub Secrets に GCP_SA_KEY を登録
# 1. Firebase Console > プロジェクトの設定 > サービスアカウント > 新しい秘密鍵の生成
# 2. ダウンロードした JSON を Base64 エンコード: base64 -i xxx.json | pbcopy
# 3. GitHub > Settings > Secrets > GCP_SA_KEY に貼り付け
name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Build
        run: cd app && npm run build

      - name: Setup Firebase credentials
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "::error::GCP_SA_KEY が設定されていません。Firebase Console でサービスアカウントの秘密鍵を取得し、Base64 エンコードして GitHub Secrets に登録してください。"
            exit 1
          fi
          echo "${{ secrets.GCP_SA_KEY }}" | base64 -d > "$RUNNER_TEMP/firebase-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-key.json" >> $GITHUB_ENV

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project sport-performance-library --non-interactive
